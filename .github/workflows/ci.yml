name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Cloudflare worker integration tests
        if: matrix.os == 'ubuntu-latest'
        run: cd worker && bun run test:cf

  e2e:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Prepare local D1 for E2E
        working-directory: worker
        run: |
          cat > .dev.vars <<'EOF'
          DIVMEMORY_API_KEY=e2e-api-key
          DIVMEMORY_WEB_PASSWORD=e2e-test-password
          COOKIE_SECRET=e2e-test-cookie-secret
          EOF
          wrangler d1 execute divmemory-db --local --file=migrations/0000_giant_tyrannus.sql
          wrangler d1 execute divmemory-db --local --file=migrations/0001_sloppy_punisher.sql

      - name: E2E tests
        run: bun run test:e2e
        env:
          DIVMEMORY_WEB_PASSWORD: e2e-test-password
          COOKIE_SECRET: e2e-test-cookie-secret

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
