name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Cloudflare worker integration tests
        if: matrix.os == 'ubuntu-latest'
        run: cd worker && bun run test:cf

  e2e:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Prepare local D1 for E2E
        working-directory: worker
        run: |
          bun wrangler d1 execute divmemory-db-e2e --config wrangler.e2e.jsonc --local --file=migrations/0000_giant_tyrannus.sql
          bun wrangler d1 execute divmemory-db-e2e --config wrangler.e2e.jsonc --local --file=migrations/0001_sloppy_punisher.sql

      - name: E2E tests
        run: bun run test:e2e
        env:
          DIVMEMORY_WEB_PASSWORD: e2e-test-password
          COOKIE_SECRET: e2e-test-cookie-secret

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
